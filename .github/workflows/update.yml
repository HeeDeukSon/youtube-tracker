name: Update YouTube Tracker

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:       # Manual trigger button on GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch YouTube data
        if: github.event_name != 'push'
        run: |
          EXPECTED=$(grep -c '^\s*Handle' youtube-tracker.txt)
          THRESHOLD=$(( EXPECTED * 80 / 100 ))
          echo "Expecting $EXPECTED channels, threshold: $THRESHOLD"

          cp results.json results.backup.json
          node scripts/tracker.js || true

          OK=$(node -e "try{const s=require('./fetch-stats.json');console.log(s.ok)}catch(_){console.log(0)}")
          QUOTA=$(node -e "try{const s=require('./fetch-stats.json');console.log(s.quotaHit)}catch(_){console.log(false)}")
          echo "Freshly fetched: $OK / $EXPECTED (quota hit: $QUOTA)"

          if [ "$OK" -lt "$THRESHOLD" ]; then
            echo "⚠️  Below threshold ($OK < $THRESHOLD) — restoring committed results.json"
            cp results.backup.json results.json
          else
            echo "✅ Fresh data OK — committing results.json"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git diff --cached --quiet || git commit -m "data: auto-update results.json [skip ci]"
            git push
          fi
          rm -f results.backup.json fetch-stats.json
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Fetch GA4 stats
        if: github.event_name != 'push'
        run: node scripts/ga4-fetch.js
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}

      - name: Apply tag enrichment
        if: github.event_name != 'push'
        run: node scripts/patch.js

      - name: Prepare deployment folder
        run: |
          mkdir _site
          cp -r index.html css js pages images results.json _site/ 2>/dev/null || true
          cp ga4-stats.json _site/ 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
