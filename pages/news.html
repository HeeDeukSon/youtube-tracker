<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lumina Study — News</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    @keyframes ls-skel-pulse { 0%,100%{opacity:.35} 50%{opacity:.65} }
    .ls-skel { background:var(--ls-surface); border-radius:var(--radius-sm); animation:ls-skel-pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- ═══ TOP HEADER ═══ -->
  <header class="ls-header">
    <div class="ls-header__left">
      <button class="ls-icon-btn" aria-label="메뉴">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="ls-header__logo">Lumina Study</span>
    </div>
    <div class="ls-header__icons">
      <button class="ls-icon-btn" aria-label="테마 전환" onclick="LuminaTheme.toggle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="4"/>
          <line x1="12" y1="20" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="4" y2="12"/>
          <line x1="20" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══ MAIN CONTENT — skeleton renders immediately, replaced by ui-news.js ═══ -->
  <main id="news-main" style="padding: 20px; padding-bottom: 80px;">

    <!-- Title + subtitle -->
    <div class="ls-skel" style="height:18px;width:160px;margin-bottom:8px;"></div>
    <div class="ls-skel" style="height:11px;width:210px;margin-bottom:24px;"></div>

    <!-- 3 stat boxes -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px;">
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;text-align:center;"><div class="ls-skel" style="height:26px;width:40px;margin:0 auto 6px;"></div><div class="ls-skel" style="height:10px;width:56px;margin:0 auto;"></div></div>
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;text-align:center;"><div class="ls-skel" style="height:26px;width:40px;margin:0 auto 6px;"></div><div class="ls-skel" style="height:10px;width:56px;margin:0 auto;"></div></div>
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;text-align:center;"><div class="ls-skel" style="height:26px;width:40px;margin:0 auto 6px;"></div><div class="ls-skel" style="height:10px;width:56px;margin:0 auto;"></div></div>
    </div>

    <!-- Category section -->
    <div class="ls-skel" style="height:14px;width:100px;margin-bottom:12px;"></div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:32px;">
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;"><div class="ls-skel" style="height:11px;width:70px;margin-bottom:8px;"></div><div class="ls-skel" style="height:22px;width:36px;margin-bottom:4px;"></div><div class="ls-skel" style="height:10px;width:90px;"></div></div>
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;"><div class="ls-skel" style="height:11px;width:70px;margin-bottom:8px;"></div><div class="ls-skel" style="height:22px;width:36px;margin-bottom:4px;"></div><div class="ls-skel" style="height:10px;width:90px;"></div></div>
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;"><div class="ls-skel" style="height:11px;width:70px;margin-bottom:8px;"></div><div class="ls-skel" style="height:22px;width:36px;margin-bottom:4px;"></div><div class="ls-skel" style="height:10px;width:90px;"></div></div>
      <div style="background:var(--ls-surface);border-radius:var(--radius-md);padding:14px;"><div class="ls-skel" style="height:11px;width:70px;margin-bottom:8px;"></div><div class="ls-skel" style="height:22px;width:36px;margin-bottom:4px;"></div><div class="ls-skel" style="height:10px;width:90px;"></div></div>
    </div>

    <!-- Latest videos section -->
    <div class="ls-skel" style="height:14px;width:110px;margin-bottom:12px;"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:10px;background:var(--ls-surface);border-radius:var(--radius-md);padding:10px;"><div class="ls-skel" style="width:88px;height:50px;flex-shrink:0;border-radius:var(--radius-sm);"></div><div style="flex:1;"><div class="ls-skel" style="height:11px;width:90%;margin-bottom:6px;"></div><div class="ls-skel" style="height:11px;width:65%;margin-bottom:8px;"></div><div class="ls-skel" style="height:10px;width:50%;"></div></div></div>
      <div style="display:flex;gap:10px;background:var(--ls-surface);border-radius:var(--radius-md);padding:10px;"><div class="ls-skel" style="width:88px;height:50px;flex-shrink:0;border-radius:var(--radius-sm);"></div><div style="flex:1;"><div class="ls-skel" style="height:11px;width:85%;margin-bottom:6px;"></div><div class="ls-skel" style="height:11px;width:60%;margin-bottom:8px;"></div><div class="ls-skel" style="height:10px;width:45%;"></div></div></div>
      <div style="display:flex;gap:10px;background:var(--ls-surface);border-radius:var(--radius-md);padding:10px;"><div class="ls-skel" style="width:88px;height:50px;flex-shrink:0;border-radius:var(--radius-sm);"></div><div style="flex:1;"><div class="ls-skel" style="height:11px;width:92%;margin-bottom:6px;"></div><div class="ls-skel" style="height:11px;width:70%;margin-bottom:8px;"></div><div class="ls-skel" style="height:10px;width:40%;"></div></div></div>
      <div style="display:flex;gap:10px;background:var(--ls-surface);border-radius:var(--radius-md);padding:10px;"><div class="ls-skel" style="width:88px;height:50px;flex-shrink:0;border-radius:var(--radius-sm);"></div><div style="flex:1;"><div class="ls-skel" style="height:11px;width:80%;margin-bottom:6px;"></div><div class="ls-skel" style="height:11px;width:55%;margin-bottom:8px;"></div><div class="ls-skel" style="height:10px;width:48%;"></div></div></div>
      <div style="display:flex;gap:10px;background:var(--ls-surface);border-radius:var(--radius-md);padding:10px;"><div class="ls-skel" style="width:88px;height:50px;flex-shrink:0;border-radius:var(--radius-sm);"></div><div style="flex:1;"><div class="ls-skel" style="height:11px;width:88%;margin-bottom:6px;"></div><div class="ls-skel" style="height:11px;width:62%;margin-bottom:8px;"></div><div class="ls-skel" style="height:10px;width:43%;"></div></div></div>
    </div>

  </main>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <nav class="ls-bottom-nav" role="navigation" aria-label="메인 네비게이션">
    <button class="ls-nav-item" data-nav="study" role="tab" aria-selected="false" aria-label="Study">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      <span>Study</span>
    </button>
    <button class="ls-nav-item" data-nav="status" role="tab" aria-selected="false" aria-label="Status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Status</span>
    </button>
    <button class="ls-nav-item is-active" data-nav="news" role="tab" aria-selected="true" aria-label="News">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
      <span>News</span>
    </button>
    <button class="ls-nav-item" data-nav="info" role="tab" aria-selected="false" aria-label="Info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>Info</span>
    </button>
    <button class="ls-nav-item" data-nav="profile" role="tab" aria-selected="false" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="../js/state.js"></script>
  <script src="../js/ui-news.js"></script>
</body>
</html>
