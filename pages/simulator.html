<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lumina Study — Workplace Simulator</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .sim-section {
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      background-color: #1a233a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
    }

    .sim-section__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ls-accent);
      margin-bottom: 12px;
    }

    .sim-section__placeholder {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- ═══ TOP HEADER ═══ -->
  <header class="ls-header">
    <div class="ls-header__left">
      <button class="ls-icon-btn" aria-label="Back" onclick="window.location.href='profile.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div style="display:flex; align-items:center;">
        <span class="ls-header__logo">Lumina Study</span>
        <span style="font-size:10px; padding:2px 6px; background:var(--ls-accent); color:var(--ls-bg); border-radius:4px; margin-left:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Simulator</span>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main style="padding: 20px; padding-bottom: 100px;">

    <!-- ── Bulletin Board ── -->
    <div class="sim-section__label" style="padding-left:4px;">This Week's Topics</div>
    <div id="bulletin-board">
      <div class="sim-section">
        <div class="sim-section__placeholder">
          Topics will appear here. (Rendering logic — Phase 2)
        </div>
      </div>
    </div>

    <!-- ── Chatting Room ── -->
    <div class="sim-section__label" style="padding-left:4px; margin-top:8px;">Your Professional Opinion</div>
    <div id="chatting-room">
      <div class="sim-section">
        <div class="sim-section__placeholder">
          Opinion input area will appear here. (Rendering logic — Phase 2)
        </div>
      </div>
    </div>

  </main>

  <!-- ═══ BOTTOM NAVIGATION ═══ -->
  <nav class="ls-bottom-nav" role="navigation" aria-label="Main Navigation">
    <button class="ls-nav-item" data-nav="study" role="tab" aria-selected="false" aria-label="Study">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><polygon points="6 4 20 12 6 20 6 4"/></svg>
      <span>Study</span>
    </button>
    <button class="ls-nav-item" data-nav="status" role="tab" aria-selected="false" aria-label="Status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Status</span>
    </button>
    <button class="ls-nav-item" data-nav="news" role="tab" aria-selected="false" aria-label="News">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
      <span>News</span>
    </button>
    <button class="ls-nav-item" data-nav="info" role="tab" aria-selected="false" aria-label="Info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <span>Info</span>
    </button>
    <button class="ls-nav-item" data-nav="profile" role="tab" aria-selected="false" aria-label="Profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="../js/state.js"></script>
</body>
</html>
